client:
  name: "Dr. Sarah Mitchell - Dentist"
  timezone: "America/New_York"

modules:
  booking: true
  payments: false
  reminders: true

whatsapp:
  phone_number_id: "${WHATSAPP_PHONE_NUMBER_ID}"
  verify_token: "${WHATSAPP_VERIFY_TOKEN}"

booking:
  calendar_id: "${GOOGLE_CALENDAR_ID}"
  calendar_owner_email: "${GOOGLE_CALENDAR_OWNER_EMAIL}"
  business_hours:
    start: "09:00"
    end: "18:00"
  services:
    - name: "Dental Cleaning"
      duration_minutes: 45
      price: 150
    - name: "Dental Checkup"
      duration_minutes: 45
      price: 120
    - name: "Cleaning + Checkup (bundle)"
      duration_minutes: 45
      price: 200
    - name: "Follow-up"
      duration_minutes: 45
      price: 80
  locations:
    - name: "Downtown Office"
      address: "456 Oak Avenue, Springfield"
      days: ["monday", "wednesday", "friday"]
  cancellation_policy: "Appointments can be cancelled up to 24 hours in advance. After that period, a 40% fee will be charged."

payments:
  sandbox: true

reminders:
  hours_before: 24
  message_template: "Reminder: {service} tomorrow at {time} at {location}. If you have any questions, message us here."
